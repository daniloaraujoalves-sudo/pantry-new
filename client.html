<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vault AI - Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #e1e1e1; margin: 0; padding: 20px; }
        .nav { display: flex; gap: 15px; margin-bottom: 20px; background: #151921; padding: 15px; border-radius: 8px; border: 1px solid #232a35; align-items: center; }
        .nav a { color: #00a8ff; text-decoration: none; font-weight: bold; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #151921; padding: 20px; border-radius: 12px; border: 1px solid #232a35; margin-bottom: 20px; }
        .status-save { font-size: 12px; color: #00ff88; float: right; }
        button { background: #00ff88; color: #0b0e14; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="client.html">Início</a>
            <span id="admLinks" style="display:none;">
                <a href="estoque.html"> | Estoque</a>
                <a href="dinheiro.html"> | Financeiro</a>
            </span>
            <a href="index.html" onclick="sessionStorage.clear()" style="margin-left:auto; color: #eb4d4b;">Sair</a>
        </div>

        <div class="card">
            <span id="saveMsg" class="status-save">Sincronizado</span>
            <h1 id="boasVindas">Olá!</h1>
            <p>Utilizador atual: <strong id="userEmail" style="color:#00a8ff;"></strong></p>
            <p>Seus créditos: <strong id="meuSaldo" style="color:#00ff88; font-size: 1.5rem;">0</strong></p>
            <button onclick="adicionarCredito()">Simular Ganho de Crédito (+100)</button>
        </div>
    </div>

    <script>
        // Dados da ABA atual (Session)
        const nome = sessionStorage.getItem('usuarioNome');
        const email = sessionStorage.getItem('usuarioEmail');
        const role = sessionStorage.getItem('role');

        if (!nome) window.location.href = "index.html";

        document.getElementById('boasVindas').innerText = `Olá, ${nome}!`;
        document.getElementById('userEmail').innerText = email;

        if (role === 'admin') document.getElementById('admLinks').style.display = 'inline';

        // Saldo Global vinculado ao E-mail (Local Storage)
        let saldo = parseInt(localStorage.getItem('saldo_' + email)) || 0;
        document.getElementById('meuSaldo').innerText = saldo;

        function adicionarCredito() {
            saldo += 100;
            document.getElementById('meuSaldo').innerText = saldo;
            salvarDados();
        }

        function salvarDados() {
            localStorage.setItem('saldo_' + email, saldo);
            document.getElementById('saveMsg').innerText = "Salvando...";
            setTimeout(() => { 
                document.getElementById('saveMsg').innerText = "Salvo: " + new Date().toLocaleTimeString(); 
            }, 800);
        }
        setInterval(salvarDados, 60000);
    </script>
</body>
</html>
