<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vault AI - Login</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #151921; padding: 2.5rem; border-radius: 16px; border: 1px solid #232a35; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00a8ff; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e232d; border: 1px solid #2d343e; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00a8ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0086cc; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>VAULT AI</h2>
        <form id="loginForm">
            <input type="text" id="name" placeholder="Seu Nome" required>
            <input type="email" id="email" placeholder="Seu E-mail" required>
            <button type="submit">ACESSAR</button>
        </form>
    </div>
    <script>
        const ADM_EMAIL = "danilo.araujo.alves@escola.pr.gov.br";

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nome = document.getElementById('name').value;
            const email = document.getElementById('email').value.toLowerCase();
            
            // Define Permissões
            const role = (email === ADM_EMAIL) ? 'admin' : 'user';
            
            localStorage.setItem('usuarioNome', nome);
            localStorage.setItem('usuarioEmail', email);
            localStorage.setItem('role', role);
            
            // Banco de Dados Local
            let banco = JSON.parse(localStorage.getItem('bancoUsuarios')) || [];
            const usuarioExiste = banco.find(u => u.email === email);
            
            if (!usuarioExiste) {
                banco.push({ nome, email, data: new Date().toLocaleString('pt-BR') });
                localStorage.setItem('bancoUsuarios', JSON.stringify(banco));
            }

            window.location.href = "client.html";
        });
    </script>
</body>
</html>
