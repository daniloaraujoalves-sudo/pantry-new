<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vault AI - Financeiro</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: white; padding: 20px; text-align: center; }
        .box { background: #151921; padding: 50px; border-radius: 15px; border: 1px solid #00ff88; display: inline-block; }
        .money { font-size: 40px; color: #00ff88; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Faturamento Estimado</h2>
        <div class="money" id="faturamento">R$ 0,00</div>
        <br>
        <a href="client.html" style="color: #00a8ff; text-decoration: none;">← Voltar</a>
    </div>
    <script>
        // Simulação: Soma o faturamento baseado nos usuários
        const logs = JSON.parse(localStorage.getItem('bancoUsuarios')) || [];
        const total = logs.length * 500; // Cada usuário vale 500 de faturamento
        document.getElementById('faturamento').innerText = `R$ ${total.toLocaleString('pt-BR')},00`;
    </script>
</body>
</html>
