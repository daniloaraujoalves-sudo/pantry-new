<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vault AI - Estoque</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #151921; }
        th, td { padding: 15px; border: 1px solid #232a35; text-align: left; }
        th { color: #00a8ff; }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('role') !== 'admin') window.location.href = "client.html";
    </script>

    <h2>Logs de Usuários (Estoque de Dados)</h2>
    <a href="client.html" style="color: #00a8ff;">← Voltar</a>
    <br><br>
    <table>
        <thead>
            <tr><th>Usuário</th><th>E-mail</th><th>Data de Cadastro</th></tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
    <script>
        const logs = JSON.parse(localStorage.getItem('bancoUsuarios')) || [];
        document.getElementById('tabela').innerHTML = logs.map(l => `
            <tr><td>${l.nome}</td><td>${l.email}</td><td>${l.data}</td></tr>
        `).join('');
    </script>
</body>
</html>
